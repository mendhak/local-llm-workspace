services:

  ohmypi:
    image: local/ohmypi
    build:
      context: .
      dockerfile_inline: |
        FROM node:22-bookworm
        RUN curl -fsSL https://bun.sh/install | BUN_INSTALL=/usr/local bash -s 
        RUN /usr/local/bin/bun install -g @oh-my-pi/pi-coding-agent
        RUN /root/.bun/bin/omp  --version 
        # Add to PATH
        ENV PATH="/root/.bun/bin:${PATH}"
        CMD ["/bin/bash"]
    container_name: ohmypi
    stdin_open: true 
    tty: true 
    restart: no
    volumes:
      - ${PWD}:/workspace
      - ../configs/ohmypi.yml:/root/.omp/agent/models.yml
    working_dir: /workspace


