services:
  llama-server:
    extends:
      file: ../compose-common.yml
      service: llama-server
    volumes:
      - ${PWD}/configs/gemma-4-26B-A4B-it-chat_template.jinja:/model-config/gemma-4-26B-A4B-it-chat_template.jinja:ro
    # Best are /models/gemma-4-26B-A4B-it-UD-IQ4_NL.gguf, gemma-4-26B-A4B-it-MXFP4_MOE.gguf, gemma-4-31B-it-Q4_K_M.gguf
    command: >
      --model /models/gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
      --port 8080
      --host 0.0.0.0
      --threads 8
      --temp 1.0 --top_p 0.95 --top_k 64 
      --fit on
      --fit-target 512
      --fit-ctx 131072
      --cache-type-k q8_0 --cache-type-v q8_0
      --batch-size 512 --ubatch-size 512 
      --parallel 1
      --flash-attn on
      --sleep-idle-seconds 300
      --perf
      --no-mmap --mlock
      --reasoning on
