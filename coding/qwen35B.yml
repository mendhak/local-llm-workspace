services:
  llama-server:
    extends:
      file: ../compose-common.yml
      service: llama-server
    # --temp 0.7 --top_p 0.8 --top_k 20 --min_p 0.0 --presence_penalty 1.5 --repeat_penalty 1.0 
    command: >
      --model /models/Qwen3.6-35B-A3B-UD-Q8_K_XL.gguf
      --port 8080
      --host 0.0.0.0
      --threads 8
      --temp 0.6 --top_p 0.95 --top_k 20 --min_p 0.0 --presence_penalty 0.0 --repeat_penalty 1.0
      --fit on
      --fit-target 512
      --fit-ctx 262144
      --cache-type-k q8_0 --cache-type-v q8_0
      --parallel 1
      --flash-attn on
      --no-mmap
      --sleep-idle-seconds 300
      --chat-template-kwargs '{"preserve_thinking": true}' --reasoning-budget -1
      --webui-mcp-proxy
