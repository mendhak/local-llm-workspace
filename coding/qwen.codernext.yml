services:
  llama-server:
    extends:
      file: ../compose-common.yml
      service: llama-server
    environment:
      - GGML_CUDA_GRAPH_OPT=1
    command: >
      -m /models/Qwen3-Coder-Next-UD-Q4_K_M.gguf
      --port 8080
      --host 0.0.0.0
      --threads 8
      --threads-batch 16
      --no-mmap
      --temp 1.0 --top-p 0.95 --top-k 40 --min_p 0.01 --repeat_penalty 1.0
      --fit on
      --fit-target 512
      --fit-ctx 65536
      --cache-type-k q4_0 --cache-type-v q4_0
      --parallel 1
      --flash-attn on
      --sleep-idle-seconds 300      
